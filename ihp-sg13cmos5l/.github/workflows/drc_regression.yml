name: DRC Regression Testing (CMOS5L)

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'ihp-sg13cmos5l/libs.tech/klayout/tech/drc/**'
  workflow_dispatch:

jobs:
  drc_regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore KLayout .deb from cache
        id: cache-klayout
        uses: actions/cache@v4
        with:
          path: klayout-0_30_3.deb
          key: klayout-deb-cache-ubuntu-0_30_3
          restore-keys: |
            klayout-deb-cache-

      - name: Download KLayout .deb if not cached
        if: steps.cache-klayout.outputs.cache-hit != 'true'
        run: |
          echo "Downloading KLayout .deb..."
          curl -L --retry 5 --retry-delay 5 --retry-all-errors \
            -o klayout-0_30_3.deb https://www.klayout.org/downloads/Ubuntu-24/klayout_0.30.3-1_amd64.deb

      - name: Install KLayout
        run: |
          sudo apt update -qq -y
          sudo apt install ./klayout-0_30_3.deb
          echo "KLayout version:"
          klayout -v

      - name: Run KLayout DRC Regression
        run: |
          cd ihp-sg13cmos5l
          make env
          make test-DRC-main

      - name: Run KLayout top-level DRC Deck
        run: |
          klayout -b -r ihp-sg13cmos5l/libs.tech/klayout/tech/drc/ihp-sg13cmos5l.drc \
            -rd run_mode=deep \
            -rd threads=1 \
            -rd no_feol=false \
            -rd no_beol=false \
            -rd no_offgrid=false \
            -rd no_pin=false \
            -rd no_forbidden=false \
            -rd input=ihp-sg13cmos5l/libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true

      - name: Run KLayout DRC script in single-process mode
        run: |
          cd ihp-sg13cmos5l
          . .venv/bin/activate
          python3 libs.tech/klayout/tech/drc/run_drc.py \
            --mp 1 \
            --disable_extra_rules \
            --path libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true
